<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <body>
        <header th:fragment="header" class="header">
            <div class="header-left">
                <a class="logo" th:href="@{/home}">
                    <i class="fas fa-graduation-cap"></i>
                    <span class="logo-text">PANSportal</span>
                </a>
            </div>

            <div class="header-right">
                <div class="user-index-container" th:if="${currentUser != null and currentUser.nrAlbumu != null}">
                    <span class="user-index-number user-index-bold" th:text="${currentUser.nrAlbumu}"></span>
                </div>
                <div class="user-menu-wrapper">
                    <div class="user-info" id="userMenuToggle" th:data-user-id="${currentUser?.id}">
                        <div class="user-avatar" style="overflow: hidden; display: flex; align-items: center; justify-content: center;">
                            <img th:if="${currentUser != null}" 
                                 th:src="@{'/api/users/' + ${currentUser.id} + '/avatar'}" 
                                 style="width: 100%; height: 100%; object-fit: cover;"
                                 loading="lazy"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" 
                                 alt="Avatar użytkownika">
                            <i class="fas fa-user" style="display:none; font-size: 1.2rem;" aria-hidden="true"></i>
                            <i th:if="${currentUser == null}" class="fas fa-user" aria-hidden="true"></i>
                        </div>
                        <div class="user-details">
                            <span class="user-name" th:text="${currentUser?.firstName} + ' ' + ${currentUser?.lastName}"></span>
                            <span class="user-role" th:text="${currentUser?.role}"></span>
                        </div>
                        <i class="fas fa-chevron-down user-menu-arrow"></i>
                    </div>

                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        <a th:href="@{/profile}" class="user-dropdown-item">
                            <i class="fas fa-user"></i>
                            <span>Mój profil</span>
                        </a>
                        <a th:href="@{/settings}" class="user-dropdown-item">
                            <i class="fas fa-cog"></i>
                            <span>Edycja profilu</span>
                        </a>
                        <a th:href="@{/change-password}" class="user-dropdown-item">
                            <i class="fas fa-lock"></i>
                            <span>Zmiana hasła</span>
                        </a>
                        <div class="user-dropdown-divider"></div>
                        <a href="#" class="user-dropdown-item" id="themeToggleDropdown">
                            <span class="theme-toggle-text">Przełącz na motyw ciemny</span>
                        </a>
                    </div>
                </div>

                <div class="header-divider"></div>

                <div class="notifications" id="notificationDropdownToggle">
                    <button class="notification-btn" aria-label="Powiadomienia" title="Powiadomienia">
                        <i class="fas fa-bell" aria-hidden="true"></i>
                        <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                    </button>
                    
                    <div class="notification-dropdown-menu" id="notificationDropdownMenu">
                        <div class="notification-dropdown-header">
                            <h3>Powiadomienia</h3>
                            <div class="notification-actions" style="display: flex; gap: 8px;">
                                <button id="markAllReadBtn" class="mark-all-read-btn" title="Oznacz wszystkie jako przeczytane">
                                    <i class="fas fa-check-double"></i>
                                </button>
                                <button id="deleteAllBtn" class="delete-all-btn" title="Wyczyść wszystkie powiadomienia" style="background: transparent; border: none; color: #ef4444; cursor: pointer; padding: 4px; border-radius: 4px; transition: background 0.2s;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="notification-dropdown-body" id="notificationList">
                            <div class="notification-empty">Brak nowych powiadomień</div>
                        </div>
                    </div>
                </div>

                <div class="header-divider"></div>

                <a th:href="@{/logout}" class="logout-btn" aria-label="Wyloguj się">
                    <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
                    <span>Wyloguj</span>
                </a>
            </div>
        </header>
    </body>
</html>

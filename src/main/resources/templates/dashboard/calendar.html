<!DOCTYPE html>
<html layout:decorate="~{layout/main-layout}">
    <head>
        <title>Kalendarz</title>
        <th:block layout:fragment="page-styles">
            <link rel="stylesheet" th:href="@{/css/dashboard/calendar.css(v=${#dates.createNow().getTime()})}" href="../../static/css/dashboard/calendar.css">
        
        <style>
    .custom-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
    .custom-modal-content { background-color: #fff; margin: 15% auto; padding: 25px; border-radius: 10px; width: 90%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-family: sans-serif; }
    .custom-modal-close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1; }
    .custom-modal-close:hover { color: #333; }
    .modal-detail-row { margin-bottom: 10px; font-size: 16px; }
</style>

        </th:block>
    </head>
    <body>
        <div layout:fragment="content">
            <div class="calendar-wrapper">
                <div class="calendar-header-custom">
                    <div class="month-selector">
                        <h2 id="currentMonth"></h2>
                        <button id="prevMonthBtn" class="month-nav-btn">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <button id="nextMonthBtn" class="month-nav-btn">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                    
                    <div style="display: flex; align-items: center;">
                        <select id="eventTypeFilter" onchange="fetchAndRenderFilteredEvents()" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; margin-right: 15px; background-color: white; cursor: pointer;">
                            <option value="ALL">Wszystkie wydarzenia</option>
                            <option value="EXAM">Tylko Egzaminy</option>
                            <option value="HOLIDAY">Tylko Święta</option>
                            <option value="BREAK">Tylko Przerwy / Ferie</option>
                        </select>
                        <button id="todayBtn" class="today-btn">Dzisiaj</button>
                    </div>
                    </div>
                
                <div id="calendarGrid">
                    </div>

                <div class="loading" id="loadingCalendar">
                    <div class="spinner"></div>
                    <p>Ładowanie kalendarza...</p>
                </div>

<div id="eventModal" class="custom-modal">
    <div class="custom-modal-content">
        <span class="custom-modal-close" onclick="document.getElementById('eventModal').style.display='none'">&times;</span>
        <h3 id="modalEventTitle" style="margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;">Tytuł wydarzenia</h3>
        <div class="modal-detail-row">
            <strong>Kategoria:</strong> <span id="modalEventType">...</span>
        </div>
        <div class="modal-detail-row">
            <strong>Termin:</strong> <span id="modalEventDate">...</span>
        </div>
    </div>
</div>

            </div>
        </div>
        <th:block layout:fragment="page-scripts">
            <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js" integrity="sha384-5JIwZN3kuxX2zKsavvNmbZ3zhZZMUtu/eQiK3BbXukpSXp0Cd2ZP4OAYKx7mrPgI" crossorigin="anonymous"></script>
            <script th:src="@{/js/dashboard/calendar.js(v=${#dates.createNow().getTime()})}"></script>
            <script>
                // inicjalizacja kalendarza po załadowaniu DOM
                document.addEventListener('DOMContentLoaded', () => {
                    // sprawdzenie czy klasa FullCalendarInitializer istnieje
                    if(typeof FullCalendarInitializer !== 'undefined'){
                        const manager = new FullCalendarInitializer();
                        manager.renderCalendar();
                    }
                });
            </script>
        </th:block>
    </body>
</html>

<!DOCTYPE html>
<html layout:decorate="~{layout/main-layout}">
    <head>
        <title>Harmonogram uczelni</title>
        <th:block layout:fragment="page-styles">
            <link rel="stylesheet" th:href="@{/css/dashboard/schedule.css(v=${#dates.createNow().getTime()})}" href="../../static/css/dashboard/schedule.css">
            <link rel="stylesheet" th:href="@{/css/admin/admin-schedule.css(v=${#dates.createNow().getTime()})}" href="../../static/css/admin/admin-schedule.css">
        </th:block>
    </head>
    <body>

        <div layout:fragment="content">
            <div class="schedule-wrapper">
                <div class="admin-schedule-header">
                    <h2 class="page-title-large" style="margin-bottom: 0;">Harmonogram uczelni</h2>
                    
                    <div class="group-selector-wrapper">
                        <label for="adminGroupSelector"><i class="fas fa-layer-group"></i> Wybierz kierunek:</label>
                        <select id="adminGroupSelector">
                            <option value="">Wybierz z listy</option>
                        </select>
                    </div>
                </div>

                <div class="schedule-view-actions">
                    <div class="view-mode-selector">
                        <label class="mode-option">
                            <input type="radio" name="viewMode" value="weekly" checked>
                            <span><i class="fas fa-calendar-week"></i> Tygodniowy</span>
                        </label>
                        <label class="mode-option">
                            <input type="radio" name="viewMode" value="semester">
                            <span><i class="fas fa-calendar-alt"></i> Semestralny</span>
                        </label>
                    </div>

                    <div class="zoom-controls">
                        <button id="zoomOutBtn" class="zoom-btn" title="Pomniejsz">
                            <i class="fas fa-search-minus"></i>
                        </button>
                        <span id="zoomLevelLabel" class="zoom-label">100%</span>
                        <button id="zoomInBtn" class="zoom-btn" title="Powiększ">
                            <i class="fas fa-search-plus"></i>
                        </button>
                        <button id="zoomResetBtn" class="zoom-btn secondary" title="Resetuj">
                            <i class="fas fa-redo-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="schedule-controls" id="adminScheduleControls" style="display: none;">
                    <div class="week-navigation">
                        <button id="prevWeekBtn" class="nav-btn" title="Poprzedni tydzień">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button id="todayBtn" class="nav-btn">Dzisiaj</button>
                        <button id="nextWeekBtn" class="nav-btn" title="Następny tydzień">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    
                    <div class="current-week-info">
                        <span id="dateRangeLabel" class="date-range">--</span>
                        <select id="weekSelector" class="week-type-select"></select>
                    </div>

                    <div class="schedule-filters" id="classFilters">
                    </div>
                </div>

                <div id="adminInitialState" class="initial-empty-state">
                    <i class="fas fa-university"></i>
                    <div class="empty-schedule" style="padding: 0; margin: 0; background: transparent;">
                        <h3>Brak harmonogramu zajęć</h3>
                        <p>Wybierz kierunek z listy powyżej, aby wyświetlić pełny harmonogram zajęć.</p>
                    </div>
                </div>

                <div id="emptySchedule" class="initial-empty-state" style="display: none;">
                    <i class="fas fa-calendar-times"></i>
                    <div class="empty-schedule" style="padding: 0; margin: 0; background: transparent;">
                        <h3>Brak harmonogramu zajęć</h3>
                        <p>Nie znaleziono żadnych zajęć w wybranym okresie.</p>
                    </div>
                </div>

                <div class="schedule-grid" id="scheduleGrid" style="display: none;">
                </div>
            </div>

            <div id="classDetailsModal" class="modal">
                <div class="modal-content class-details-content">
                    <span class="close-modal">&times;</span>
                    <div class="modal-header-strip" id="modalColorStrip"></div>
                    <div class="modal-body-details">
                        <h2 id="modalClassTitle"></h2>
                        <div class="modal-meta-row">
                            <span class="modal-badge" id="modalClassType"></span>
                            <div class="modal-time-container">
                                <span class="modal-time-date" id="modalClassDate"></span>
                                <span class="modal-time-hours" id="modalClassTime"></span>
                            </div>
                        </div>
                        
                        <div class="modal-info-grid">
                            <div class="info-item">
                                <i class="fas fa-chalkboard-teacher"></i>
                                <div>
                                    <label>Prowadzący</label>
                                    <p id="modalClassTeacher"></p>
                                </div>
                            </div>
                            <div class="info-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <div>
                                    <label>Sala</label>
                                    <div class="modal-room-container">
                                        <p id="modalClassRoomMain"></p>
                                        <p id="modalClassRoomSub" class="modal-room-sub"></p>
                                    </div>
                                </div>
                            </div>
                            <div class="info-item" id="modalGroupRow">
                                <i class="fas fa-users"></i>
                                <div>
                                    <label>Kierunek</label>
                                    <p id="modalClassGroup"></p>
                                </div>
                            </div>
                            <div class="info-item" id="modalGroupNumberRow">
                                <i class="fas fa-layer-group"></i>
                                <div>
                                    <label>Numer grupy</label>
                                    <p id="modalClassGroupNumber"></p>
                                </div>
                            </div>
                            <div class="info-item" id="modalSpecializationRow">
                                <i class="fas fa-code-branch"></i>
                                <div>
                                    <label>Specjalność</label>
                                    <p id="modalClassSpecialization"></p>
                                </div>
                            </div>
                            <div class="info-item" id="modalCreditTypeRow">
                                <i class="fas fa-graduation-cap"></i>
                                <div>
                                    <label>Forma zaliczenia</label>
                                    <p id="modalClassCreditType"></p>
                                </div>
                            </div>
                        </div>

                        <div class="occurrences-accordion">
                            <div class="accordion-header" id="modalOccurrencesToggle">
                                <div class="accordion-title-wrapper">
                                    <i class="fas fa-calendar-alt"></i>
                                    <span>Terminy wszystkich spotkań</span>
                                </div>
                                <i class="fas fa-chevron-down toggle-icon"></i>
                            </div>
                            <div class="accordion-content" id="modalOccurrencesList">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <th:block layout:fragment="page-scripts">
            <script th:src="@{/js/dashboard/schedule.js(v=${#dates.createNow().getTime()})}"></script>
            <script th:src="@{/js/admin/admin-schedule.js(v=${#dates.createNow().getTime()})}"></script>
        </th:block>

    </body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brak uprawnień - PANSportal</title>

    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/common/style.css">
    <link rel="stylesheet" href="/css/common/theme.css">
    <script>
        (function() {
            var t = localStorage.getItem('theme');
            if (t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    
    <style>
        .error-page-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .error-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--border-color);
            animation: slideUp 0.5s ease-out;
        }

        [data-theme="dark"] .error-card {
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .error-icon {
            font-size: 5rem;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .error-code {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
            line-height: 1;
        }

        .error-title {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin: 10px 0 20px;
        }

        .error-desc {
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            background: var(--bg-step);
            color: var(--text-dark);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" id="themeToggleBtn" title="Zmień motyw">
        <i class="fas fa-moon"></i>
        <i class="fas fa-sun"></i>
    </button>
    
    <div class="main-container error-page-container">
        <div class="error-card">
            <i class="fas fa-shield-alt error-icon"></i>
            <h1 class="error-code">403</h1>
            <h2 class="error-title">Brak dostępu</h2>
            <p class="error-desc">
                Nie masz odpowiednich uprawnień do przeglądania tej strony, lub twoja rola nie została jeszcze w pełni przypisana przez administratora.
            </p>
            <div class="actions">
                <a href="#" onclick="history.back(); return false;" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i> Wróć
                </a>
                <a href="/login" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Zaloguj ponownie
                </a>
            </div>
        </div>
    </div>
    <script src="/js/common/theme.js" defer></script>
</body>
</html>

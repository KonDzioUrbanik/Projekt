<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex, nofollow">

        <!-- Import czcionek oraz ikon -->
        <link rel="icon" th:href="@{/favicon.png}" type="image/png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">

        <!-- Główny arkusz stylów -->
        <link rel="stylesheet" th:href="@{/css/common/style.css(v=${#dates.createNow().getTime()})}" href="../../static/css/common/style.css">
        <link rel="stylesheet" th:href="@{/css/common/theme.css(v=${#dates.createNow().getTime()})}">

        <script>
            (function() {
                var t = localStorage.getItem('theme');
                if (t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            })();
        </script>
    </head>
    <body>
         <!-- Przycisk zmiany motywu -->
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Zmień motyw" aria-label="Przełącz motyw">
            <i class="fas fa-moon" aria-hidden="true"></i>
            <i class="fas fa-sun"></i>
        </button>
        
        <div class="main-container">
            <div class="auth-container">
                <div class="title-section">
                    <h1 class="main-title">Zaloguj się</h1>
                    <p class="subtitle">Witaj ponownie!</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" id="email" name="email" class="form-control" placeholder="Numer indeksu lub adres e-mail" autocomplete="username" aria-label="Adres e-mail lub numer indeksu">
                    </div>

                    <div class="form-group">
                        <div class="input-password-wrapper">
                            <input type="password" id="password" class="form-control" placeholder="Hasło" name="password" autocomplete="current-password" aria-label="Hasło">
                            <i class="fas fa-eye password-toggle-icon" id="togglePassword" aria-hidden="true" role="button" aria-label="Pokaż/ukryj hasło" tabindex="0"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember-me" name="remember-me">
                            <label for="remember-me">Zapamiętaj mnie</label>
                        </div>
                        <div class="recovery-password">
                            <a th:href="@{/forgot-password}" class="forgot-password">Zapomniałeś hasła?</a>
                        </div>
                    </div>

                    <!-- Miejsce na komunikaty -->
                    <div id="loginMessage" class="form-message"></div>

                    <button type="submit" class="btn btn-primary btn-full" id="loginButton">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Zaloguj się</span>
                    </button>

                    <div class="auth-link">
                        <p class="small-text">Nie masz konta?
                            <a th:href="@{/register}" class="link-accent">Zarejestruj się</a>
                        </p>
                    </div>
                </form>

                <div class="auth-link-home">
                    <a th:href="@{/}" class="back-link">
                        <i class="fas fa-arrow-left"></i> Powrót do strony głównej
                    </a>
                </div>
            </div>
        </div>
        
        <!-- JS -->
        <script th:src="@{/js/common/auth-utils.js(v=${#dates.createNow().getTime()})}" src="../static/js/common/auth-utils.js" defer></script>
        <script th:src="@{/js/auth/login.js(v=${#dates.createNow().getTime()})}" src="../static/js/auth/login.js" defer></script>
        <script th:src="@{/js/common/theme.js(v=${#dates.createNow().getTime()})}" defer></script>
    </body>
</html>

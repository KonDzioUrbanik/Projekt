spring.application.name=ProjectBackend
server.port=8090

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# validate / update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.serialization.write-dates-as-timestamps=false

spring.jpa.open-in-view=false 

server.error.whitelabel.enabled=false
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never
server.server-header=


server.forward-headers-strategy=framework

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

spring.messages.encoding=UTF-8
spring.messages.basename=messages

springdoc.override-with-generic-response=false
springdoc.packages-to-scan=com.pansgroup.projectbackend.controller,com.pansgroup.projectbackend.module
springdoc.paths-to-match=/api/**

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html


app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}

app.security.remember-me.key=${APP_SECURITY_REMEMBER_ME_KEY}
app.maintenance.bypass-token=${MAINTENANCE_BYPASS_TOKEN}
app.chat.encryption-key=${APP_CHAT_ENCRYPTION_KEY}

spring.mail.host=ssl0.ovh.net
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# Tomcat & Multipart
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=35MB
server.tomcat.max-http-form-post-size=35MB
server.tomcat.max-swallow-size=-1

# Performance Tuning
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# Caching Infrastructure
spring.cache.type=caffeine
spring.cache.cache-names=analyticsSummary
spring.cache.caffeine.spec=expireAfterWrite=1h,maximumSize=100
